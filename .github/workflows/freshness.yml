name: Freshness

# Active freshness re-check. The per-push G10 gate only verifies the re-check
# *cadence* (dates) offline; this weekly job additionally checks that tracked
# source links still resolve and, when the cadence has lapsed or links are dead,
# opens an issue so a human/LLM does the relevance triage (which a script can't).
on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check freshness (cadence + link liveness)
        id: fresh
        run: |
          if python3 scripts/check-freshness.py --links; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open an issue if stale or links are dead
        if: steps.fresh.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Freshness re-check due';
            const body = [
              'The weekly freshness scan flagged an overdue re-check and/or dead source links.',
              '',
              'Run `python3 scripts/check-freshness.py --links` for details.',
              '',
              '**Action (human/LLM):** re-scan OWASP LLM/Agentic updates, new injection/jailbreak',
              'papers, and benchmark revisions; decide relevance; then bump `freshness.json`',
              '(`checkedAt` / `lastFullScan`) and add a `RESEARCH_LOG.md` entry.',
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'freshness',
            });
            if (!open.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['freshness'],
              });
            }
